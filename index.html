<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Spotify Premium — Untuk Kamu</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="background-layer"></div>

    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-top">
          <div class="spotify-logo" aria-label="Spotify">
            <span></span>
          </div>

          <div class="sidebar-heading">
            <p class="eyebrow">Untuk kamu</p>
            <h1>Untuk kamu,<br />Ya. Kamu.</h1>
            <p class="intro">Satu lagu khusus, diputar dengan penuh perhatian.</p>
          </div>

          <div class="playlist-card">
            <div class="playlist-head">Playlist</div>
            <button class="playlist-item active">I Don't Love You</button>
            <button class="playlist-item">Untukmu</button>
            <button class="playlist-item">Satu kali saja</button>
          </div>
        </div>
      </aside>

      <main class="main-panel">
        <section class="hero-card" id="playerShell">
          <div class="cover-column">
            <div class="cover-wrap">
              <img class="cover-art" src="coverlagu.jpg" alt="Cover lagu" />
            </div>
          </div>

          <div class="player-details">
            <p class="track-kicker">Lagu spesial</p>
            <h2>I Don't Love You</h2>
            <p class="artist">My Chemical Romance</p>
            <button class="heart-btn" aria-label="Suka">♡</button>

            <div class="controls-row" aria-label="Kontrol utama">
              <button class="icon-btn" data-action="shuffle" aria-label="Shuffle">🔀</button>
              <button class="icon-btn" data-action="prev" aria-label="Sebelumnya">⏮</button>
              <button class="icon-btn primary" data-action="toggle" aria-label="Putar / jeda">▶</button>
              <button class="icon-btn" data-action="next" aria-label="Selanjutnya">⏭</button>
              <button class="icon-btn" data-action="repeat" aria-label="Repeat">🔁</button>
            </div>


            <div class="timeline-block">
              <input id="progressBar" class="progress-bar" type="range" min="0" max="100" value="0" step="0.1" />
              <div class="time-row">
                <span id="currentTime">00:00</span>
                <span id="duration">00:00</span>
              </div>
            </div>

            <div class="footer-row">
              <label class="volume-control" for="volumeSlider">
                <span>🔊</span>
                <input id="volumeSlider" type="range" min="0" max="1" step="0.01" value="0.8" />
              </label>
              <div class="toggle-group">
                <button class="icon-btn small" id="repeatBtn" aria-label="Ulangi">↻</button>
                <button class="icon-btn small" id="shuffleBtn" aria-label="Acak">⇢</button>
              </div>
            </div>
          </div>
        </section>
      </main>

      <aside class="lyrics-column">
        <div class="lyrics-header">
          <p class="lyrics-label">Lirik</p>
          <p class="lyrics-sub">Disinkronkan 100% dengan suara</p>
        </div>
        <div id="lyricsList" class="lyrics-list"></div>
      </aside>
    </div>

    <div class="bottom-player">
      <div class="bottom-track">
        <div class="bottom-cover"></div>
        <div>
          <p class="bottom-title">I Don't Love You</p>
          <p class="bottom-artist">My Chemical Romance</p>
        </div>
      </div>

      <div class="bottom-controls">
        <button class="icon-btn small" data-action="prev" aria-label="Sebelumnya">⏮</button>
        <button class="icon-btn primary small" data-action="toggle" aria-label="Putar / jeda">▶</button>
        <button class="icon-btn small" data-action="next" aria-label="Selanjutnya">⏭</button>
      </div>

      <div class="bottom-progress"><span id="miniProgress"></span></div>
    </div>

    <audio id="audio" preload="metadata">
      <source src="LAGUNYA.MP3" type="audio/mpeg" />
    </audio>

    <script src="script.js"></script>
  </body>
</html>
